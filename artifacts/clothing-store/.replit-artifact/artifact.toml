kind = "web"
previewPath = "/"
title = "Loja de Roupas"
version = "1.0.0"
id = "artifacts/clothing-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21647

[services.development]
run = "pnpm --filter @workspace/clothing-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clothing-store", "run", "build" ]
publicDir = "artifacts/clothing-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21647"
BASE_PATH = "/"
