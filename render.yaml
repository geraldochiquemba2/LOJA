services:
  - type: web
    name: clothing-store-loja
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: loja-db # This assumes the user might want a Render DB, but they are using Neon.
          property: connectionString
      - key: PORT
        value: 10000
    healthCheckPath: /api/categories
